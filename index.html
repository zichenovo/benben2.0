<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="
width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>笨笨的音乐柜</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?
family=Cormorant+Garamond:wght@300;400;500&
family=Noto+Serif+SC:wght@300;400;500&
display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    width:100vw;
    min-height:100vh;

    overflow-y:auto;
    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #f7f1ea,
    #eadbcf
    );

    font-family:
    'Cormorant Garamond',
    'Noto Serif SC',
    serif;

    position:relative;
}

/* 光影 */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    linear-gradient(
    120deg,
    rgba(255,220,170,0.16),
    transparent 30%
    );

    pointer-events:none;
}

/* 标题 */

.title{

    width:100%;

    text-align:center;

    padding-top:46px;

    font-size:42px;

    color:#f7e5d3;

    letter-spacing:3px;

    text-shadow:
    0 2px 12px rgba(0,0,0,0.25);
}

.subtitle{

    width:100%;

    text-align:center;

    margin-top:8px;

    color:#e7d4c4;

    font-size:13px;

    letter-spacing:1px;
}

/* 柜子 */

.shelf{

    width:92%;

    margin:auto;

    margin-top:26px;
    margin-bottom:120px;

    padding:
    26px 16px 34px 16px;

    border-radius:16px;

    background:
    linear-gradient(
    180deg,
    #71492d,
    #4d301d
    );

    box-shadow:
    inset 0 0 12px rgba(255,255,255,0.08),
    inset 0 -6px 14px rgba(0,0,0,0.28),
    0 10px 28px rgba(0,0,0,0.25);

    position:relative;
}

/* 木板 */

.row{

    display:flex;

    justify-content:space-between;

    margin-bottom:24px;

    padding-bottom:18px;

    border-bottom:
    10px solid rgba(30,16,10,0.42);

    position:relative;
}

.row:last-child{

    border-bottom:none;
    margin-bottom:0;
}

/* 专辑 */

.album{

    width:31%;

    display:flex;

    flex-direction:column;

    align-items:center;

    position:relative;

    cursor:pointer;
}

/* 外壳 */

.cover{

    width:100%;
    aspect-ratio:1/1;

    border-radius:6px;

    position:relative;

    overflow:hidden;

    background:
    linear-gradient(
    145deg,
    #f3e4d5,
    #dbc4ae
    );

    box-shadow:
    0 6px 12px rgba(0,0,0,0.28),
    inset 0 0 10px rgba(255,255,255,0.35);

    transition:
    transform 0.35s ease,
    box-shadow 0.35s ease;
}

/* 贴纸感 */

.cover::before{

    content:"";

    position:absolute;

    inset:8px;

    border:
    1px solid rgba(255,255,255,0.22);

    border-radius:4px;
}

/* 黑胶 */

.vinyl{

    width:74%;

    aspect-ratio:1/1;

    border-radius:50%;

    position:absolute;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    background:
    radial-gradient(circle,
    #222 0%,
    #111 12%,
    #444 13%,
    #151515 32%,
    #2e2e2e 46%,
    #0e0e0e 100%);

    box-shadow:
    0 0 10px rgba(0,0,0,0.4);

    overflow:hidden;
}

/* 中间圆 */

.vinyl::before{

    content:"";

    position:absolute;

    width:24%;

    aspect-ratio:1/1;

    border-radius:50%;

    background:
    rgba(255,255,255,0.88);

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);
}

/* 专辑图 */

.art{

    position:absolute;

    inset:10%;

    border-radius:50%;

    overflow:hidden;

    opacity:0.92;
}

.art img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* hover */

.album:active .cover{

    transform:
    translateY(-6px)
    scale(1.03);

    box-shadow:
    0 14px 24px rgba(0,0,0,0.32);
}

.album.playing .vinyl{

    animation:
    spin 3s linear infinite;
}

@keyframes spin{

    from{
        transform:
        translate(-50%,-50%)
        rotate(0deg);
    }

    to{
        transform:
        translate(-50%,-50%)
        rotate(360deg);
    }
}

/* 歌名 */

.song{

    margin-top:10px;

    text-align:center;

    color:#fff2e8;

    font-size:15px;

    line-height:1.25;

    text-shadow:
    0 1px 2px rgba(0,0,0,0.3);
}

/* 播放器 */

.player{

    position:fixed;

    left:50%;
    bottom:18px;

    transform:
    translateX(-50%);

    width:92%;

    background:
    rgba(255,245,236,0.95);

    backdrop-filter:blur(12px);

    border-radius:24px;

    padding:
    14px 18px;

    display:flex;

    align-items:center;

    gap:14px;

    box-shadow:
    0 10px 28px rgba(0,0,0,0.12);
}

/* mini黑胶 */

.player-vinyl{

    width:52px;
    height:52px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    #111 0%,
    #333 30%,
    #111 100%);

    position:relative;

    flex-shrink:0;
}

.player-vinyl::before{

    content:"";

    position:absolute;

    width:12px;
    height:12px;

    border-radius:50%;

    background:white;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);
}

.playing .player-vinyl{

    animation:
    spin 3s linear infinite;
}

.player-text{

    flex:1;
}

.now{

    color:#4f3424;

    font-size:16px;
}

.tip{

    margin-top:4px;

    color:#b5947d;

    font-size:12px;
}

audio{

    width:100%;
    margin-top:10px;
}

/* 灰尘 */

.dust{

    position:fixed;

    width:3px;
    height:3px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.45);

    animation:
    floatUp linear infinite;

    pointer-events:none;
}

@keyframes floatUp{

    0%{

        transform:
        translateY(100vh);

        opacity:0;
    }

    30%{
        opacity:0.5;
    }

    100%{

        transform:
        translateY(-120vh);

        opacity:0;
    }
}

</style>
</head>

<body>

<div class="title">
笨笨的音乐柜
</div>

<div class="subtitle">
点击专辑开始播放
</div>

<div class="shelf">

<!-- row -->

<div class="row">

<div class="album"
onclick="playSong(this,'末日')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?1">
</div>

</div>

</div>

<div class="song">
末日
</div>

</div>

<div class="album"
onclick="playSong(this,'走马')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?2">
</div>

</div>

</div>

<div class="song">
走马
</div>

</div>

<div class="album"
onclick="playSong(this,'天赋')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?3">
</div>

</div>

</div>

<div class="song">
天赋
</div>

</div>

</div>

<!-- row -->

<div class="row">

<div class="album"
onclick="playSong(this,'空空')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?4">
</div>

</div>

</div>

<div class="song">
空空
</div>

</div>

<div class="album"
onclick="playSong(this,'半壶纱')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?5">
</div>

</div>

</div>

<div class="song">
半壶纱
</div>

</div>

<div class="album"
onclick="playSong(this,'东京不太热')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?6">
</div>

</div>

</div>

<div class="song">
东京不太热
</div>

</div>

</div>

<!-- row -->

<div class="row">

<div class="album"
onclick="playSong(this,'夏天的风')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?7">
</div>

</div>

</div>

<div class="song">
夏天的风
</div>

</div>

<div class="album"
onclick="playSong(this,'AlwaysOnline')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?8">
</div>

</div>

</div>

<div class="song">
AlwaysOnline
</div>

</div>

<div class="album"
onclick="playSong(this,'绿色')">

<div class="cover">

<div class="vinyl">

<div class="art">
<img src="https://picsum.photos/300?9">
</div>

</div>

</div>

<div class="song">
绿色
</div>

</div>

</div>

</div>

<!-- 播放器 -->

<div class="player"
id="player">

<div class="player-vinyl"></div>

<div class="player-text">

<div class="now"
id="nowPlaying">

未选择歌曲

</div>

<div class="tip">
点击专辑开始播放
</div>

<audio controls>
<source src="">
</audio>

</div>

</div>

<script>

function playSong(el,song){

    document
    .querySelectorAll(".album")
    .forEach(album=>{

        album.classList.remove("playing");
    });

    el.classList.add("playing");

    document
    .getElementById("player")
    .classList.add("playing");

    document
    .getElementById("nowPlaying")
    .innerText =
    "正在播放：《" + song + "》";
}

/* 漂浮灰尘 */

for(let i=0;i<40;i++){

    const dust =
    document.createElement("div");

    dust.className =
    "dust";

    dust.style.left =
    Math.random()*100 + "vw";

    dust.style.animationDuration =
    (18 + Math.random()*22) + "s";

    dust.style.animationDelay =
    (-Math.random()*30) + "s";

    dust.style.opacity =
    Math.random()*0.5;

    document.body.appendChild(dust);
}

</script>

</body>
</html>
