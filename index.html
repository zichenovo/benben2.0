<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="
width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>笨笨的歌单</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="
https://fonts.googleapis.com/css2?
family=Cormorant+Garamond:wght@300;400;500&
family=Noto+Serif+SC:wght@300;400;500&
display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    width:100vw;
    min-height:100vh;

    overflow-y:auto;
    overflow-x:hidden;

    background:
    linear-gradient(
    180deg,
    #f8f3ef,
    #f3ece7
    );

    font-family:
    'Cormorant Garamond',
    'Noto Serif SC',
    serif;
}

/* 标题 */

.title{

    width:100%;

    text-align:center;

    padding-top:52px;

    font-size:64px;

    font-weight:400;

    color:#8b6f63;

    letter-spacing:2px;
}

.subtitle{

    width:100%;

    text-align:center;

    margin-top:10px;

    font-size:15px;

    color:#b39b90;

    letter-spacing:1px;
}

/* 柜子 */

.shelf{

    width:92%;

    margin:auto;

    margin-top:42px;
    margin-bottom:60px;

    padding:
    30px 18px 40px 18px;

    background:
    #c89f7d;

    border-radius:26px;

    box-shadow:
    inset 0 0 14px rgba(0,0,0,0.12),
    0 10px 40px rgba(0,0,0,0.08);

    position:relative;
}

/* 木板 */

.row{

    width:100%;

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:22px 14px;

    padding-bottom:36px;
    margin-bottom:36px;

    border-bottom:
    10px solid
    rgba(96,58,34,0.25);
}

/* 专辑 */

.album{

    display:flex;

    flex-direction:column;

    align-items:center;

    position:relative;
}

/* 黑胶 */

.vinyl{

    width:88px;
    height:88px;

    border-radius:50%;

    position:relative;

    background:
    radial-gradient(circle,
    #111 0%,
    #111 18%,
    #2a2a2a 19%,
    #151515 42%,
    #242424 64%,
    #0f0f0f 100%);

    box-shadow:
    0 6px 14px rgba(0,0,0,0.28);

    transition:
    transform 0.4s ease,
    box-shadow 0.4s ease;
}

.vinyl::before{

    content:"";

    position:absolute;

    inset:10px;

    border-radius:50%;

    border:
    1px solid rgba(255,255,255,0.08);
}

.vinyl::after{

    content:"";

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);

    width:14px;
    height:14px;

    border-radius:50%;

    background:#e9d2b9;
}

/* 封面颜色 */

.cover1{
background:#e9c9c1;
}

.cover2{
background:#cfd8f6;
}

.cover3{
background:#d9c6ef;
}

.cover4{
background:#f1d8bb;
}

.cover5{
background:#b7d7cc;
}

/* 歌名 */

.song-name{

    margin-top:10px;

    font-size:16px;

    color:#fffaf6;

    text-align:center;

    line-height:1.35;

    text-shadow:
    0 1px 2px rgba(0,0,0,0.12);
}

/* hover */

.album:active .vinyl{

    transform:
    scale(1.08);

    box-shadow:
    0 0 24px rgba(255,255,255,0.55);

    animation:
    spin 2s linear infinite;
}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* 当前播放 */

.player{

    position:fixed;

    bottom:22px;
    left:50%;

    transform:
    translateX(-50%);

    width:88%;

    background:
    rgba(255,255,255,0.82);

    backdrop-filter:blur(12px);

    border-radius:20px;

    padding:
    14px 16px;

    box-shadow:
    0 8px 24px rgba(0,0,0,0.08);

    z-index:999;
}

.now-playing{

    font-size:15px;

    color:#8f7467;

    margin-bottom:10px;

    text-align:center;
}

audio{

    width:100%;
}

/* 漂浮灰尘 */

.dust{

    position:fixed;

    width:6px;
    height:6px;

    border-radius:50%;

    background:
    rgba(255,255,255,0.45);

    pointer-events:none;

    animation:
    floatUp linear infinite;
}

@keyframes floatUp{

    0%{

        transform:
        translateY(100vh)
        scale(0.4);

        opacity:0;
    }

    30%{
        opacity:0.5;
    }

    100%{

        transform:
        translateY(-120vh)
        scale(1.4);

        opacity:0;
    }
}

</style>
</head>

<body>

<div class="title">
笨笨的音乐柜
</div>

<div class="subtitle">
点击专辑试听 ♫
</div>

<div class="shelf">

<div class="row">

<div class="album"
onclick="playSong('末日')">

<div class="vinyl cover1"></div>

<div class="song-name">
末日
</div>

</div>

<div class="album"
onclick="playSong('走马')">

<div class="vinyl cover2"></div>

<div class="song-name">
走马
</div>

</div>

<div class="album"
onclick="playSong('天赋')">

<div class="vinyl cover3"></div>

<div class="song-name">
天赋
</div>

</div>

</div>

<div class="row">

<div class="album"
onclick="playSong('空空')">

<div class="vinyl cover4"></div>

<div class="song-name">
空空
</div>

</div>

<div class="album"
onclick="playSong('半壶纱')">

<div class="vinyl cover5"></div>

<div class="song-name">
半壶纱
</div>

</div>

<div class="album"
onclick="playSong('要爱我')">

<div class="vinyl cover1"></div>

<div class="song-name">
要爱我
</div>

</div>

</div>

<div class="row">

<div class="album"
onclick="playSong('东京不太热')">

<div class="vinyl cover2"></div>

<div class="song-name">
东京不太热
</div>

</div>

<div class="album"
onclick="playSong('夏天的风')">

<div class="vinyl cover3"></div>

<div class="song-name">
夏天的风
</div>

</div>

<div class="album"
onclick="playSong('AlwaysOnline')">

<div class="vinyl cover5"></div>

<div class="song-name">
AlwaysOnline
</div>

</div>

</div>

<div class="row">

<div class="album"
onclick="playSong('绿色')">

<div class="vinyl cover4"></div>

<div class="song-name">
绿色
</div>

</div>

<div class="album"
onclick="playSong('怪物')">

<div class="vinyl cover1"></div>

<div class="song-name">
怪物
</div>

</div>

<div class="album"
onclick="playSong('如果爱忘了')">

<div class="vinyl cover2"></div>

<div class="song-name">
如果爱忘了
</div>

</div>

</div>

</div>

<div class="player">

<div class="now-playing"
id="playingText">

正在播放：未选择

</div>

<audio
id="audioPlayer"
controls>

<source src="">

</audio>

</div>

<script>

function playSong(song){

    document
    .getElementById("playingText")
    .innerText =
    "正在播放：《" + song + "》";

    /* 这里以后放音频 */

    /*
    audio.src =
    "music/" + song + ".mp3";

    audio.play();
    */
}

/* 灰尘 */

for(let i=0;i<26;i++){

    const dust =
    document.createElement("div");

    dust.className =
    "dust";

    dust.style.left =
    Math.random()*100 + "vw";

    dust.style.animationDuration =
    (14 + Math.random()*20) + "s";

    dust.style.animationDelay =
    (-Math.random()*30) + "s";

    dust.style.opacity =
    Math.random()*0.4;

    document.body.appendChild(dust);
}

</script>

</body>
</html>
